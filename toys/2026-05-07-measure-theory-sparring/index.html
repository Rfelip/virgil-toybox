<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Measure Theory Sparring</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
        onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
<style>
  :root {
    --bg: #16181c;
    --panel: #1f2228;
    --ink: #e9ebee;
    --dim: #8a8f99;
    --accent: #d6a96a;
    --accent-soft: #54452a;
    --good: #7eb87e;
    --warn: #d6a96a;
    --hard: #c97a7a;
    --rule: #2c3036;
    --serif: 'Crimson Pro', Georgia, 'Times New Roman', serif;
    --mono: 'Berkeley Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.55;
    padding: 24px;
    max-width: 880px;
    margin: 0 auto;
  }
  header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  h1 { margin: 0; font-weight: 600; font-size: 28px; letter-spacing: 0.5px; }
  .subtitle { color: var(--dim); margin-top: 4px; font-style: italic; }
  .stats {
    display: flex; gap: 18px; margin-top: 12px;
    font-family: var(--mono); font-size: 13px; color: var(--dim);
  }
  .stats b { color: var(--ink); font-weight: 500; }
  nav {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  nav button {
    background: var(--panel); color: var(--ink); border: 1px solid var(--rule);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.4px;
  }
  nav button:hover { border-color: var(--accent); }
  nav button.active { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 28px 32px;
    min-height: 360px;
    position: relative;
  }
  .topic {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .prompt {
    font-size: 19px;
    margin-bottom: 18px;
  }
  .answer {
    border-top: 1px dashed var(--rule);
    padding-top: 18px;
    margin-top: 18px;
    color: var(--ink);
  }
  .answer h4 { color: var(--accent); margin: 14px 0 6px; font-size: 14px; letter-spacing: 0.4px; }
  .answer p { margin: 8px 0; }
  .answer code { font-family: var(--mono); font-size: 14px; background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: 3px; }
  .actions {
    margin-top: 24px; display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
  }
  .actions button {
    border: 1px solid var(--rule); background: var(--panel);
    padding: 10px 18px; border-radius: 4px; color: var(--ink);
    cursor: pointer; font-family: var(--mono); font-size: 12px; letter-spacing: 0.6px;
  }
  .actions button.primary { background: var(--accent-soft); border-color: var(--accent); }
  .actions .grade { display: none; gap: 8px; }
  .actions .grade.shown { display: flex; }
  .grade .hard { border-color: var(--hard); color: var(--hard); }
  .grade .med  { border-color: var(--warn); color: var(--warn); }
  .grade .easy { border-color: var(--good); color: var(--good); }
  .actions button:hover { filter: brightness(1.15); }
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--dim); font-style: italic;
  }
  .keyboard-hint {
    color: var(--dim); font-family: var(--mono); font-size: 11px;
    margin-left: auto;
  }
  footer {
    margin-top: 24px; color: var(--dim); font-size: 12px;
    text-align: center; font-family: var(--mono);
  }
  .progress {
    height: 4px; background: var(--rule); border-radius: 2px;
    overflow: hidden; margin: 8px 0 0;
  }
  .progress > div {
    height: 100%; background: var(--accent);
    transition: width 0.25s ease;
  }
</style>
</head>
<body>
<header>
  <h1>Measure Theory Sparring</h1>
  <div class="subtitle">A drill room. Built for Ruan, by Virgil. — 2026-05-07</div>
  <div class="stats">
    <span>deck: 19 cards</span>
    <span>due today: <b id="stat-due">—</b></span>
    <span>in rotation: <b id="stat-total">—</b></span>
    <span>seen: <b id="stat-seen">—</b></span>
    <span>streak: <b id="stat-streak">—</b></span>
  </div>
  <div class="progress"><div id="progress-bar"></div></div>
</header>

<nav id="topic-nav"></nav>

<main id="card-area">
  <div class="empty">Loading deck&hellip;</div>
</main>

<footer>
  <span>space → flip · 1 hard · 2 medium · 3 easy · n next · b back · r reset filters</span><br>
  <span style="opacity:0.5">progress in localStorage. clear on a new device.</span>
</footer>

<script src="cards.js"></script>
<script src="app.js"></script>
</body>
</html>
