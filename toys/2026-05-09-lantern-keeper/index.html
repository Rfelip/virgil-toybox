<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern Keeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                          */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dusk:     #1a1814;
      --bg-mid-dusk: #221e18;
      --bg-midnight: #0e0d0c;
      --bg-mid-mid:  #141210;
      --bg-dawn:     #1c1914;
      --bg-mid-dawn: #231f16;

      --warm-wash-dusk:  radial-gradient(ellipse 80% 40% at 50% 105%, rgba(120,80,20,0.18) 0%, transparent 70%);
      --warm-wash-mid:   radial-gradient(ellipse 80% 40% at 50% 105%, rgba(60,40,10,0.12) 0%, transparent 70%);
      --warm-wash-dawn:  radial-gradient(ellipse 80% 50% at 50% 105%, rgba(140,90,30,0.22) 0%, transparent 70%);

      --lantern-core:  #f6c27a;
      --lantern-outer: #f0a657;
      --lantern-dim:   #c07828;
      --label-color:   #c9a96e;
      --sidebar-text:  #7a6b52;
      --sidebar-dim:   #4a3d2a;
      --rule-color:    rgba(120,100,60,0.18);

      --mode: dusk;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      font-family: 'EB Garamond', Georgia, serif;
      color: #c9a96e;
      background: var(--bg-dusk);
      transition: background 1.2s ease;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Mode backgrounds                                                     */
    /* ------------------------------------------------------------------ */
    body.mode-dusk     { background-color: var(--bg-dusk); }
    body.mode-midnight { background-color: var(--bg-midnight); }
    body.mode-dawn     { background-color: var(--bg-dawn); }

    /* ------------------------------------------------------------------ */
    /* Layout shell                                                         */
    /* ------------------------------------------------------------------ */
    .scene-wrap {
      flex: 1;
      display: flex;
      gap: 0;
    }

    .canvas-col {
      flex: 1;
      min-width: 0;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .warm-wash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: var(--warm-wash-dusk);
      transition: opacity 1.2s ease;
      z-index: 0;
    }
    body.mode-midnight .warm-wash { background: var(--warm-wash-mid); opacity: 0.7; }
    body.mode-dawn     .warm-wash { background: var(--warm-wash-dawn); }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      position: relative;
      z-index: 10;
      padding: 2.2rem 2.8rem 1.2rem;
      border-bottom: 1px solid var(--rule-color);
    }

    .header-inner {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .title-block h1 {
      font-size: 1.15rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.04em;
      color: #d4a96a;
    }

    .title-block .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--sidebar-dim);
      text-transform: uppercase;
      margin-top: 0.15rem;
    }

    /* Mode toggle */
    .mode-strip {
      display: flex;
      gap: 0;
      border: 1px solid rgba(120,100,60,0.25);
    }

    .mode-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sidebar-dim);
      padding: 0.3rem 0.7rem;
      transition: color 0.3s, background 0.3s;
    }

    .mode-btn:not(:last-child) {
      border-right: 1px solid rgba(120,100,60,0.25);
    }

    .mode-btn.active {
      color: var(--lantern-core);
      background: rgba(180,120,30,0.1);
    }

    .mode-btn:hover:not(.active) {
      color: #a07840;
    }

    /* ------------------------------------------------------------------ */
    /* Main content area                                                    */
    /* ------------------------------------------------------------------ */
    .content-row {
      flex: 1;
      display: flex;
      position: relative;
      z-index: 1;
    }

    /* Lantern field */
    .lantern-field {
      flex: 1;
      min-width: 0;
      padding: 3rem 2.5rem 4rem;
      position: relative;
    }

    /* ------------------------------------------------------------------ */
    /* Lanterns                                                             */
    /* ------------------------------------------------------------------ */
    .lanterns-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2.8rem 2.2rem;
      align-items: flex-start;
    }

    .lantern-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: default;
      position: relative;
    }

    .lantern-svg {
      width: 38px;
      height: 58px;
      overflow: visible;
      transition: filter 0.4s ease;
    }

    .lantern-wrap:hover .lantern-svg {
      filter: drop-shadow(0 0 10px rgba(246,194,122,0.6));
    }

    /* The glow behind each lantern */
    .lantern-glow {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(246,194,122,0.18) 0%, transparent 70%);
      pointer-events: none;
      animation: glow-breathe var(--breathe-dur, 3s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }

    @keyframes glow-breathe {
      from { opacity: 0.5; transform: translateX(-50%) scale(0.9); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.1); }
    }

    /* The flame inside */
    .flame {
      animation: flame-flicker var(--flicker-dur, 2s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
      transform-origin: center bottom;
    }

    @keyframes flame-flicker {
      0%   { opacity: 0.85; transform: scaleX(1)    scaleY(1);    }
      25%  { opacity: 0.95; transform: scaleX(0.92) scaleY(1.04); }
      50%  { opacity: 0.80; transform: scaleX(1.06) scaleY(0.96); }
      75%  { opacity: 0.90; transform: scaleX(0.96) scaleY(1.02); }
      100% { opacity: 1;    transform: scaleX(1.02) scaleY(1.01); }
    }

    /* Cord */
    .lantern-cord {
      width: 1px;
      height: 18px;
      background: linear-gradient(to bottom, rgba(200,160,80,0.5), rgba(200,160,80,0.15));
      flex-shrink: 0;
    }

    /* Label */
    .lantern-label {
      font-size: 0.62rem;
      font-style: italic;
      font-weight: 400;
      color: rgba(180,140,70,0);
      text-align: center;
      max-width: 100px;
      line-height: 1.3;
      letter-spacing: 0.01em;
      transition: color 0.35s ease, opacity 0.35s ease;
      pointer-events: none;
    }

    /* Kind indicator dot below label */
    .lantern-kind-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--kind-color, #7a6040);
      opacity: 0;
      transition: opacity 0.35s ease;
      flex-shrink: 0;
    }

    .lantern-wrap:hover .lantern-label {
      color: rgba(200,165,90,0.85);
    }

    .lantern-wrap:hover .lantern-kind-dot {
      opacity: 0.6;
    }

    /* Kind colors */
    .lantern-wrap[data-kind="note"]   .lantern-kind-dot { --kind-color: #8a9a6a; }
    .lantern-wrap[data-kind="task"]   .lantern-kind-dot { --kind-color: #9a7a5a; }
    .lantern-wrap[data-kind="paper"]  .lantern-kind-dot { --kind-color: #6a8aaa; }
    .lantern-wrap[data-kind="person"] .lantern-kind-dot { --kind-color: #aa8a8a; }
    .lantern-wrap[data-kind="toy"]    .lantern-kind-dot { --kind-color: #b89a3a; }

    /* Flame color per kind (via fill attribute in SVG, but we tint with CSS filter) */
    .lantern-wrap[data-kind="note"]   .flame { filter: hue-rotate(15deg); }
    .lantern-wrap[data-kind="paper"]  .flame { filter: hue-rotate(-20deg) saturate(0.85); }
    .lantern-wrap[data-kind="person"] .flame { filter: hue-rotate(8deg) brightness(0.95); }

    /* ------------------------------------------------------------------ */
    /* Sidebar                                                              */
    /* ------------------------------------------------------------------ */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-left: 1px solid var(--rule-color);
      padding: 2.2rem 1.6rem 2.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sidebar-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sidebar-dim);
      margin-bottom: 0.7rem;
    }

    .keeper-note {
      font-size: 0.88rem;
      font-style: italic;
      line-height: 1.7;
      color: var(--sidebar-text);
    }

    .keeper-note-rotate {
      transition: opacity 0.6s ease;
    }

    .keeper-note-rotate.fading { opacity: 0; }

    .sidebar-rule {
      border: none;
      border-top: 1px solid var(--rule-color);
    }

    /* Kind legend */
    .kind-legend {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .kind-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.76rem;
      color: var(--sidebar-text);
      font-style: italic;
    }

    .kind-swatch {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .kind-swatch.note   { background: #8a9a6a; }
    .kind-swatch.task   { background: #9a7a5a; }
    .kind-swatch.paper  { background: #6a8aaa; }
    .kind-swatch.person { background: #aa8a8a; }
    .kind-swatch.toy    { background: #b89a3a; }

    /* Light one tonight */
    .light-section {
      margin-top: auto;
    }

    .light-btn {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid rgba(180,130,50,0.35);
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: rgba(200,160,80,0.7);
      padding: 0.55rem 0.8rem;
      text-align: center;
      letter-spacing: 0.02em;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      line-height: 1.3;
    }

    .light-btn:hover {
      border-color: rgba(246,194,122,0.5);
      color: var(--lantern-core);
      background: rgba(180,130,30,0.06);
    }

    .light-btn:active {
      background: rgba(180,130,30,0.12);
    }

    /* ------------------------------------------------------------------ */
    /* Footer                                                               */
    /* ------------------------------------------------------------------ */
    footer {
      position: relative;
      z-index: 10;
      border-top: 1px solid var(--rule-color);
      padding: 1rem 2.8rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .footer-line {
      font-size: 0.7rem;
      color: var(--sidebar-dim);
      font-style: italic;
    }

    .footer-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--sidebar-dim);
      letter-spacing: 0.08em;
    }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                           */
    /* ------------------------------------------------------------------ */
    @media (max-width: 700px) {
      .sidebar {
        display: none;
      }

      .lantern-field {
        padding: 2rem 1.4rem 3rem;
      }

      header { padding: 1.6rem 1.4rem 1rem; }
      footer  { padding: 0.8rem 1.4rem; }

      .header-inner { flex-direction: column; align-items: flex-start; }
    }

    /* ------------------------------------------------------------------ */
    /* New-lantern flash animation                                          */
    /* ------------------------------------------------------------------ */
    @keyframes lantern-arrive {
      0%   { opacity: 0; transform: translateY(-16px); }
      60%  { opacity: 1; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .lantern-wrap.arriving {
      animation: lantern-arrive 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

  </style>
</head>
<body class="mode-dusk">

  <header>
    <div class="header-inner">
      <div class="title-block">
        <h1>Lantern Keeper</h1>
        <p class="subtitle">the exocortex, made visible</p>
      </div>
      <div class="mode-strip" role="group" aria-label="Time of day">
        <button class="mode-btn active" data-mode="dusk">Dusk</button>
        <button class="mode-btn" data-mode="midnight">Midnight</button>
        <button class="mode-btn" data-mode="dawn">Pre-dawn</button>
      </div>
    </div>
  </header>

  <div class="scene-wrap">
    <div class="canvas-col">
      <div class="warm-wash" aria-hidden="true"></div>

      <div class="content-row">
        <div class="lantern-field" id="lantern-field">
          <div class="lanterns-grid" id="lanterns-grid" role="list" aria-label="Lanterns">
            <!-- rendered by JS -->
          </div>
        </div>

        <aside class="sidebar" aria-label="Keeper's notes">
          <div>
            <p class="sidebar-section-title">Keeper's notes</p>
            <p class="keeper-note keeper-note-rotate" id="keeper-note-text">
              <!-- rotated by JS -->
            </p>
          </div>

          <hr class="sidebar-rule">

          <div>
            <p class="sidebar-section-title">By kind</p>
            <div class="kind-legend">
              <div class="kind-row"><div class="kind-swatch note"></div> note</div>
              <div class="kind-row"><div class="kind-swatch task"></div> task</div>
              <div class="kind-row"><div class="kind-swatch paper"></div> paper or book</div>
              <div class="kind-row"><div class="kind-swatch person"></div> person</div>
              <div class="kind-row"><div class="kind-swatch toy"></div> toy built</div>
            </div>
          </div>

          <hr class="sidebar-rule">

          <div class="light-section">
            <button class="light-btn" id="light-btn" type="button">
              I lit one tonight
            </button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-line">hover any lantern to read its name</span>
      <span class="footer-count" id="footer-count"></span>
    </div>
  </footer>

  <script>
    // ------------------------------------------------------------------ //
    // Data + storage                                                       //
    // ------------------------------------------------------------------ //

    const STORAGE_KEY = 'lantern-keeper-custom';

    function loadCustomLanterns() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveCustomLanterns(arr) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch {}
    }

    // ------------------------------------------------------------------ //
    // Keeper's notes — rotating reflections                               //
    // ------------------------------------------------------------------ //

    // These are computed after data loads; placeholders are filled in renderNotes().
    const NOTE_TEMPLATES = [
      d => `Tonight I hold ${d.total} lanterns. The oldest dates from ${d.oldest}.`,
      d => `${d.toys} lanterns were lit for things built. Each one a small proof of presence.`,
      d => `There are ${d.people} lanterns for people — names remembered by firelight.`,
      d => `${d.papers} lanterns for books and papers. Reading is also a kind of keeping watch.`,
      d => `${d.tasks} lanterns for things done. The doing was the point; the light is the remainder.`,
      d => `${d.notes} lanterns for notes written — thoughts that asked to be remembered.`,
      d => `The Keeper does not sleep. But sometimes the flame breathes very slowly.`,
      d => `Every lantern was dark once. Every lantern was lit by something noticed.`,
      d => `The exocortex lives in files. The lanterns live in the dark between them.`,
      d => `Some lanterns flicker faster than others. That is just their nature.`,
    ];

    let noteIndex = 0;
    let noteStats = {};

    function computeStats(lanterns) {
      const kinds = lanterns.reduce((acc, l) => {
        acc[l.kind] = (acc[l.kind] || 0) + 1;
        return acc;
      }, {});

      const dates = lanterns
        .map(l => l.lit_at)
        .filter(Boolean)
        .sort();

      return {
        total:   lanterns.length,
        oldest:  dates[0] || '—',
        newest:  dates[dates.length - 1] || '—',
        toys:    kinds['toy']    || 0,
        people:  kinds['person'] || 0,
        papers:  kinds['paper']  || 0,
        tasks:   kinds['task']   || 0,
        notes:   kinds['note']   || 0,
      };
    }

    function renderNote(stats) {
      const el = document.getElementById('keeper-note-text');
      if (!el) return;
      el.classList.add('fading');
      setTimeout(() => {
        el.textContent = NOTE_TEMPLATES[noteIndex % NOTE_TEMPLATES.length](stats);
        el.classList.remove('fading');
      }, 620);
      noteIndex++;
    }

    // ------------------------------------------------------------------ //
    // SVG lantern shape                                                    //
    // ------------------------------------------------------------------ //

    function makeLanternSVG(delay, flickerDur, breatheDur) {
      // A paper-lantern silhouette: tapered top cap, rounded body, bottom point, cord loop at top.
      // All in warm amber-gold tones.
      return `
<svg class="lantern-svg" viewBox="0 0 38 58" xmlns="http://www.w3.org/2000/svg"
     aria-hidden="true" style="--delay:${delay}s; --flicker-dur:${flickerDur}s; --breathe-dur:${breatheDur}s;">

  <!-- Hanging loop -->
  <path d="M 19 4 Q 14 1 10 3 Q 7 5 8 8" fill="none" stroke="#c07828" stroke-width="1.2" stroke-linecap="round" />

  <!-- Top cap -->
  <rect x="12" y="7" width="14" height="3.5" rx="1" fill="#b87030" />
  <rect x="14" y="10.5" width="10" height="2" rx="0.5" fill="#c07828" />

  <!-- Body — outer shell (slightly warm-tinted translucent panel look) -->
  <path d="M 14 12.5 Q 6 22 7 34 Q 8 44 19 47 Q 30 44 31 34 Q 32 22 24 12.5 Z"
        fill="#1e1508" stroke="#a06020" stroke-width="0.9" />

  <!-- Body inner glow panels (four vertical ribs of light) -->
  <g class="flame" style="--delay:${delay}s; --flicker-dur:${flickerDur}s;">
    <ellipse cx="19" cy="31" rx="8.5" ry="13" fill="url(#lanternGradient)" opacity="0.72" />
    <!-- Rib highlights -->
    <line x1="13" y1="15" x2="11.5" y2="43" stroke="rgba(246,194,122,0.18)" stroke-width="1.5" />
    <line x1="16.5" y1="13" x2="15" y2="46" stroke="rgba(246,194,122,0.22)" stroke-width="1.2" />
    <line x1="21.5" y1="13" x2="23" y2="46" stroke="rgba(246,194,122,0.22)" stroke-width="1.2" />
    <line x1="25" y1="15" x2="26.5" y2="43" stroke="rgba(246,194,122,0.18)" stroke-width="1.5" />
  </g>

  <!-- Bottom point -->
  <path d="M 15 46.5 Q 19 52 23 46.5 Z" fill="#b87030" stroke="#c07828" stroke-width="0.5" />

  <!-- Bottom tassel knot -->
  <circle cx="19" cy="53" r="1.4" fill="#9a5a18" />
  <line x1="19" y1="51.5" x2="19" y2="46.5" stroke="#a06020" stroke-width="0.8" />

  <!-- Gradient definition (per-lantern, but browsers share defs within a document — we inline a data key) -->
  <defs>
    <radialGradient id="lanternGradient" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#f6c27a" stop-opacity="0.95" />
      <stop offset="45%"  stop-color="#f0a657" stop-opacity="0.7"  />
      <stop offset="100%" stop-color="#c06018" stop-opacity="0"    />
    </radialGradient>
  </defs>

</svg>`;
    }

    // ------------------------------------------------------------------ //
    // Render lanterns                                                      //
    // ------------------------------------------------------------------ //

    function renderLanterns(lanterns) {
      const grid = document.getElementById('lanterns-grid');
      grid.innerHTML = '';

      lanterns.forEach((l, i) => {
        const delay       = (Math.random() * 3).toFixed(2);
        const flickerDur  = (1.6 + Math.random() * 2).toFixed(2);
        const breatheDur  = (2.5 + Math.random() * 3).toFixed(2);

        const wrap = document.createElement('div');
        wrap.className = 'lantern-wrap';
        wrap.setAttribute('data-kind', l.kind || 'note');
        wrap.setAttribute('role', 'listitem');
        wrap.setAttribute('aria-label', l.label);
        wrap.style.setProperty('--delay', delay + 's');
        wrap.style.setProperty('--breathe-dur', breatheDur + 's');

        wrap.innerHTML = `
          <div class="lantern-glow" aria-hidden="true"></div>
          <div class="lantern-cord" aria-hidden="true"></div>
          ${makeLanternSVG(delay, flickerDur, breatheDur)}
          <div class="lantern-label" aria-hidden="true">${escapeHtml(l.label)}</div>
          <div class="lantern-kind-dot" aria-hidden="true"></div>
        `;

        grid.appendChild(wrap);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function updateFooter(lanterns) {
      const el = document.getElementById('footer-count');
      if (el) el.textContent = `${lanterns.length} lanterns lit`;
    }

    // ------------------------------------------------------------------ //
    // Mode toggle                                                          //
    // ------------------------------------------------------------------ //

    function initModeToggle() {
      const btns = document.querySelectorAll('.mode-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', () => {
          btns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const mode = btn.dataset.mode;
          document.body.className = `mode-${mode}`;
        });
      });
    }

    // ------------------------------------------------------------------ //
    // "Light one tonight" button                                           //
    // ------------------------------------------------------------------ //

    function initLightButton(allLanterns) {
      const btn = document.getElementById('light-btn');
      if (!btn) return;

      btn.addEventListener('click', () => {
        const label = prompt('What are you lighting a lantern for?');
        if (!label || !label.trim()) return;

        const kinds = ['note', 'task', 'paper', 'person', 'toy'];
        const kindInput = prompt(`What kind? (${kinds.join(' / ')})`, 'note');
        const kind = kinds.includes((kindInput || '').trim().toLowerCase())
          ? kindInput.trim().toLowerCase()
          : 'note';

        const today = new Date().toISOString().slice(0, 10);
        const newLantern = { label: label.trim(), kind, lit_at: today };

        allLanterns.push(newLantern);

        const custom = loadCustomLanterns();
        custom.push(newLantern);
        saveCustomLanterns(custom);

        // Re-render
        renderLanterns(allLanterns);
        updateFooter(allLanterns);
        noteStats = computeStats(allLanterns);
        renderNote(noteStats);

        // Animate the new lantern in
        const grid = document.getElementById('lanterns-grid');
        const last = grid.lastElementChild;
        if (last) {
          last.classList.add('arriving');
        }
      });
    }

    // ------------------------------------------------------------------ //
    // Main                                                                 //
    // ------------------------------------------------------------------ //

    async function main() {
      // Detect file:// protocol
      if (location.protocol === 'file:') {
        const banner = document.createElement('div');
        banner.style.cssText = `
          position: fixed; top: 0; left: 0; right: 0; z-index: 999;
          background: rgba(30,20,8,0.97); border-bottom: 1px solid rgba(180,130,50,0.3);
          padding: 0.6rem 1.2rem;
          font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
          color: rgba(200,160,80,0.8); letter-spacing: 0.05em;
        `;
        banner.textContent = 'file:// — JSON fetch may be blocked. Run via serve.sh for full experience.';
        document.body.prepend(banner);
      }

      // Load seed lanterns
      let seedLanterns = [];
      try {
        const resp = await fetch('./lanterns.json');
        if (resp.ok) {
          seedLanterns = await resp.json();
        }
      } catch {
        // If fetch fails (file://), fall back to empty — custom lanterns still work
      }

      // Merge with custom lanterns from localStorage
      const custom = loadCustomLanterns();
      const allLanterns = [...seedLanterns, ...custom];

      // Sort chronologically
      allLanterns.sort((a, b) => (a.lit_at || '').localeCompare(b.lit_at || ''));

      // Render
      renderLanterns(allLanterns);
      updateFooter(allLanterns);

      // Stats + first keeper note
      noteStats = computeStats(allLanterns);
      noteIndex = 0;
      renderNote(noteStats);

      // Rotate notes every 18s
      setInterval(() => renderNote(noteStats), 18000);

      // Controls
      initModeToggle();
      initLightButton(allLanterns);
    }

    document.addEventListener('DOMContentLoaded', main);
  </script>

</body>
</html>
